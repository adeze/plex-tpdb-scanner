name: Build and publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Docker version tag to publish
        required: true
        default: '0.2.0'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.11.1'
          enable-cache: true
      - name: Install locked environment
        run: uv sync --locked --dev
      - name: Run tests
        run: uv run --frozen python -m unittest discover -s tests -p 'test_*.py'
      - name: Compile Python sources
        run: uv run --frozen python -m compileall -q provider metadata_tool

  publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Resolve image version
        id: version
        shell: bash
        run: |
          version='${{ inputs.version || github.ref_name }}'
          version="${version#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/adeze/plex-tpdb-scanner:${{ steps.version.outputs.version }}
            ghcr.io/adeze/plex-tpdb-scanner:latest
