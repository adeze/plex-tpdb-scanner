services:
  tpdb-provider:
    build: .
    container_name: tpdb-provider
    init: true
    ports:
      - "32500:32500"
    environment:
      - TPDB_API_KEY=${TPDB_API_KEY}
      - TPDB_PORT=32500
      - TPDB_LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:32500/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
